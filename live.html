



<!DOCTYPE html>
<html>
<head>
<title>NeuroStack Live</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ NeuroStack Live</h1>
<div id="status">Checking live status...</div>
<video id="video" autoplay playsinline></video>
<div class="chat-box" id="comments"></div>
<div class="input-area">
  <input id="commentInput" placeholder="Type message...">
  <button onclick="sendComment()">Send</button>
  <button onclick="like()">❤️ Like</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
   apiKey: "AIzaSyB6bSNbFZ90DO6_OTbhFEO-Jij20qLXJk0",
  authDomain: "neurostack-d65f9.firebaseapp.com",
  projectId: "neurostack-d65f9",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusText = document.getElementById("status");
const video = document.getElementById("video");
const commentsBox = document.getElementById("comments");
let peer = new Peer();

onSnapshot(doc(db,"live","status"),docSnap=>{
  if(!docSnap.exists()) return;
  const data = docSnap.data();

  if(data.isLive){
    statusText.innerHTML="🔴 LIVE NOW";
    video.style.display="block";

    const call = peer.call(data.streamId,null);
    call.on('stream', remoteStream=>{video.srcObject=remoteStream;});

    // Setup chat
    const commentsRef = collection(db,"streams",data.streamId,"comments");
    onSnapshot(query(commentsRef,orderBy("time")),snapshot=>{
      commentsBox.innerHTML="";
      snapshot.forEach(doc=>{commentsBox.innerHTML+=`<p>${doc.data().text}</p>`;});
    });

    window.sendComment=async()=>{
      const input = document.getElementById("commentInput");
      if(!input.value) return;
      await addDoc(commentsRef,{text:"Viewer: "+input.value,time:Date.now()});
      input.value="";
    }

    window.like=async()=>{
      await addDoc(collection(db,"streams",data.streamId,"likes"),{time:Date.now()});
    }

  } else {
    statusText.innerHTML="⚫ Not Live Right Now";
    video.style.display="none";
    commentsBox.innerHTML="";
  }
});
</script>

</body>
</html>
