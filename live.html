

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroStack Live</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">NeuroStack Live</div>
</header>

<div id="status">Checking live status...</div>
<video id="video" autoplay playsinline></video>

<div class="chat-box" id="comments"></div>

<div class="input-area">
  <input id="commentInput" placeholder="Type message...">
  <button id="sendBtn">Send</button>
  <button id="likeBtn">❤️ Like</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB6bSNbFZ90DO6_OTbhFEO-Jij20qLXJk0",
  authDomain: "neurostack-d65f9.firebaseapp.com",
  projectId: "neurostack-d65f9",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusText = document.getElementById("status");
const video = document.getElementById("video");
const commentsBox = document.getElementById("comments");
let peer = new Peer();

// Attach viewer functions to window
window.sendComment = ()=>{};
window.like = ()=>{};

onSnapshot(doc(db,"live","status"),docSnap=>{
  if(!docSnap.exists()) return;
  const data = docSnap.data();

  if(data.isLive){
    statusText.innerHTML="🔴 LIVE NOW";
    video.style.display="block";

    const call = peer.call(data.streamId,null);
    call.on('stream', remoteStream=>{video.srcObject=remoteStream;});

    const commentsRef = collection(db,"streams",data.streamId,"comments");

    // Attach functions for buttons
    window.sendComment = async function(){
      const input = document.getElementById("commentInput");
      if(!input.value) return;
      await addDoc(commentsRef,{text:"Viewer: "+input.value,time:Date.now()});
      input.value="";
    }

    window.like = async function(){
      await addDoc(collection(db,"streams",data.streamId,"likes"),{time:Date.now()});
    }

    onSnapshot(query(commentsRef,orderBy("time")),snapshot=>{
      commentsBox.innerHTML="";
      snapshot.forEach(doc=>{commentsBox.innerHTML+=`<p>${doc.data().text}</p>`;});
    });

  } else {
    statusText.innerHTML="⚫ Not Live Right Now";
    video.style.display="none";
    commentsBox.innerHTML="";
  }
});

// Add button event listeners
document.getElementById("sendBtn").addEventListener("click", ()=>window.sendComment());
document.getElementById("likeBtn").addEventListener("click", ()=>window.like());

</script>

</body>
</html>
