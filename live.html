
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroStack Live</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">NeuroStack Live</div>
</header>

<div id="status">Checking live status...</div>
<video id="video" autoplay playsinline></video>

<script>
const video = document.getElementById("video");
const statusText = document.getElementById("status");

// Viewer peer ID is random
const peer = new Peer({
  host: '0.peerjs.com',
  port: 443,
  secure: true,
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'turn:turn.anyfirewall.com:443?transport=tcp', username:'webrtc', credential:'webrtc' }
    ]
  }
});

// Connect to host "NeuroStack"
function connectToHost() {
  const call = peer.call("NeuroStack", null);
  call.on('stream', remoteStream => {
    video.srcObject = remoteStream;
    statusText.innerText = "🔴 LIVE NOW";
  });
  call.on('error', () => {
    statusText.innerText = "⚫ Not Live Right Now";
  });
}

// Wait a moment and connect
setTimeout(connectToHost, 1000);
</script>

</body>
</html>
