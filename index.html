<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroStack Live - Host</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">NeuroStack Live (Host)</div>
  <button id="goLiveBtn">Go Live</button>
</header>

<video id="video" autoplay muted playsinline></video>
<div id="link"></div>

<script>
const video = document.getElementById("video");

// Use PeerJS free cloud server + always host ID = NeuroStack
const peer = new Peer("NeuroStack", {
  host: '0.peerjs.com', // PeerJS cloud server
  port: 443,
  secure: true,
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'turn:turn.anyfirewall.com:443?transport=tcp', username:'webrtc', credential:'webrtc' }
    ]
  }
});

let stream;

// Start live stream
window.startShare = async function() {
  stream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
  video.srcObject = stream;

  // Show viewer link
  const baseUrl = window.location.href.replace("index.html","");
  document.getElementById("link").innerHTML = `
    Share this link with viewers:<br>
    <b><a href="${baseUrl}live.html" target="_blank">${baseUrl}live.html</a></b>
  `;

  // Answer incoming calls automatically
  peer.on('call', call => call.answer(stream));

  // Stop live when stream ends
  stream.getTracks().forEach(track => {
    track.onended = () => alert("Live ended");
  });
}

// Button click
document.getElementById("goLiveBtn").addEventListener("click", ()=>window.startShare());
</script>

</body>
</html>
